<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galería fotográfica de Juan Pablo Barbosa Cubillos - Composición fotográfica">
    <title>Juan Pablo Barbosa Cubillos | Galería Fotográfica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #111114;
            --bg-card: #16161a;
            --text-primary: #f0ece2;
            --text-secondary: #94918a;
            --accent: #c9a96e;
            --accent-glow: rgba(201, 169, 110, 0.3);
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== NOISE OVERLAY ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== AMBIENT GLOW ===== */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            top: -200px;
            right: -100px;
            background: var(--accent);
        }

        .glow-2 {
            bottom: -200px;
            left: -100px;
            background: #4a6cf7;
        }

        /* ===== HEADER / HERO ===== */
        header {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 80px 24px 60px;
            text-align: center;
            z-index: 1;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            animation: pulse-ring 3s ease-in-out infinite;
        }

        .logo-mark span {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
            50% { box-shadow: 0 0 0 12px transparent; }
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s var(--transition-smooth) both;
        }

        header p {
            font-size: clamp(0.95rem, 1.5vw, 1.1rem);
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeInUp 1s var(--transition-smooth) 0.2s both;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 1s var(--transition-smooth) 0.5s both;
        }

        .scroll-indicator span {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            animation: scroll-pulse 2s ease-in-out infinite;
        }

        @keyframes scroll-pulse {
            0%, 100% { opacity: 1; transform: scaleY(1); }
            50% { opacity: 0.3; transform: scaleY(0.6); }
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 48px;
            padding: 24px;
            margin: 0 auto 40px;
            max-width: 600px;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            animation: fadeInUp 1s var(--transition-smooth) 0.4s both;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 4px;
        }

        /* ===== GALLERY ===== */
        .gallery-section {
            position: relative;
            z-index: 1;
            padding: 0 24px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 48px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: var(--accent);
            margin: 16px auto 0;
        }

        /* Masonry Grid */
        .gallery-grid {
            columns: 3;
            column-gap: 16px;
        }

        @media (max-width: 1024px) {
            .gallery-grid { columns: 2; }
        }

        @media (max-width: 600px) {
            .gallery-grid { columns: 1; column-gap: 12px; }
        }

        /* Photo Card */
        .photo-card {
            break-inside: avoid;
            margin-bottom: 16px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
            transform: translateY(40px);
            opacity: 0;
            transition: transform 0.6s var(--transition-smooth), opacity 0.6s var(--transition-smooth);
        }

        .photo-card.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .photo-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s var(--transition-smooth);
        }

        .photo-card:hover::after {
            opacity: 1;
        }

        .photo-card img {
            width: 100%;
            display: block;
            transition: transform 0.7s var(--transition-smooth);
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        .photo-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            z-index: 2;
            transform: translateY(10px);
            opacity: 0;
            transition: all 0.4s var(--transition-smooth);
        }

        .photo-card:hover .overlay {
            transform: translateY(0);
            opacity: 1;
        }

        .overlay .photo-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .overlay .photo-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Expand icon */
        .expand-icon {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s var(--transition-smooth);
        }

        .photo-card:hover .expand-icon {
            opacity: 1;
            transform: scale(1);
        }

        .expand-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-primary);
            stroke-width: 2;
            fill: none;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--transition-smooth);
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.4s var(--transition-smooth);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }

        .lightbox-close svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
            stroke-width: 2;
            fill: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }

        .lightbox-nav svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
            stroke-width: 2;
            fill: none;
        }

        .lightbox-prev { left: 24px; }
        .lightbox-next { right: 24px; }

        .lightbox-counter {
            position: absolute;
            bottom: 24px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
        }

        .lightbox-title {
            position: absolute;
            bottom: 48px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        /* ===== FOOTER ===== */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 24px 60px;
            border-top: 1px solid var(--glass-border);
        }

        footer p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        footer .footer-name {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 8px;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        /* ===== LOADING PLACEHOLDER ===== */
        .photo-card img {
            background: var(--bg-card);
            min-height: 200px;
        }

        .photo-card img.loaded {
            min-height: unset;
        }

        /* ===== ERROR STATE ===== */
        .photo-card.error-state {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            background: var(--bg-card);
            border: 1px dashed var(--glass-border);
        }

        .photo-card.error-state .error-msg {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- Ambient glows -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- Header / Hero -->
    <header>
        <div class="logo-mark"><span>JP</span></div>
        <h1>Juan Pablo Barbosa Cubillos</h1>
        <p>Composición Fotográfica</p>
        <div class="scroll-indicator">
            <span>Explorar</span>
            <div class="scroll-line"></div>
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-number" id="photo-count">0</div>
            <div class="stat-label">Fotografías</div>
        </div>
        <div class="stat">
            <div class="stat-number">2025</div>
            <div class="stat-label">Año</div>
        </div>
        <div class="stat">
            <div class="stat-number">∞</div>
            <div class="stat-label">Perspectivas</div>
        </div>
    </div>

    <!-- Gallery -->
    <section class="gallery-section">
        <h2 class="section-title">Galería</h2>
        <div class="gallery-grid" id="gallery-grid">
            <!-- Photos are injected via JavaScript -->
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close" aria-label="Cerrar">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Anterior">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Siguiente">
            <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-title" id="lightbox-title"></div>
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <!-- Footer -->
    <footer>
        <p class="footer-name">Juan Pablo Barbosa Cubillos</p>
        <p>Composición Fotográfica &copy; 2025</p>
    </footer>

    <script>
        // =============================================================
        //  📸 FOTOS - Carpeta fotos/
        // =============================================================

        const photos = [
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.44.55 PM.jpeg", title: "Fotografía 1" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.45.47 PM.jpeg", title: "Fotografía 2" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.45.49 PM.jpeg", title: "Fotografía 3" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.45.50 PM.jpeg", title: "Fotografía 4" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.45.50 PM (1).jpeg", title: "Fotografía 5" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.45.50 PM (2).jpeg", title: "Fotografía 6" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.46.35 PM.jpeg", title: "Fotografía 7" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.48.18 PM.jpeg", title: "Fotografía 8" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.48.18 PM (1).jpeg", title: "Fotografía 9" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.48.19 PM.jpeg", title: "Fotografía 10" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.48.48 PM.jpeg", title: "Fotografía 11" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.49.24 PM.jpeg", title: "Fotografía 12" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.49.24 PM (1).jpeg", title: "Fotografía 13" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.49.24 PM (2).jpeg", title: "Fotografía 14" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.49.24 PM (3).jpeg", title: "Fotografía 15" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.49.24 PM (4).jpeg", title: "Fotografía 16" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.49.45 PM.jpeg", title: "Fotografía 17" },
            { src: "fotos/WhatsApp Image 2026-05-26 at 8.50.16 PM.jpeg", title: "Fotografía 18" },
        ];

        // ===== RENDER GALLERY =====
        const grid = document.getElementById('gallery-grid');
        const photoCount = document.getElementById('photo-count');
        let currentIndex = 0;

        photoCount.textContent = photos.length;

        photos.forEach((photo, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.setAttribute('data-index', index);
            card.innerHTML = `
                <div class="expand-icon">
                    <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </div>
                <img src="${photo.src}" alt="${photo.title}" loading="lazy" onerror="handleImgError(this)" onload="this.classList.add('loaded')">
                <div class="overlay">
                    <div class="photo-title">${photo.title}</div>
                </div>
            `;
            card.addEventListener('click', () => openLightbox(index));
            grid.appendChild(card);
        });

        // Handle image load errors gracefully
        function handleImgError(img) {
            const card = img.closest('.photo-card');
            card.classList.add('error-state');
            card.innerHTML = `<div class="error-msg">📷<br>${img.alt}<br><small>Imagen no encontrada</small></div>`;
        }

        // ===== INTERSECTION OBSERVER (scroll reveal) =====
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, i * 80);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.photo-card').forEach(card => observer.observe(card));

        // ===== LIGHTBOX =====
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxTitle = document.getElementById('lightbox-title');
        const lightboxCounter = document.getElementById('lightbox-counter');

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const photo = photos[currentIndex];
            lightboxImg.src = photo.src;
            lightboxImg.alt = photo.title;
            lightboxTitle.textContent = photo.title;
            lightboxCounter.textContent = `${currentIndex + 1} / ${photos.length}`;
        }

        function nextPhoto() {
            currentIndex = (currentIndex + 1) % photos.length;
            updateLightbox();
        }

        function prevPhoto() {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            updateLightbox();
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-next').addEventListener('click', (e) => { e.stopPropagation(); nextPhoto(); });
        document.getElementById('lightbox-prev').addEventListener('click', (e) => { e.stopPropagation(); prevPhoto(); });
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextPhoto();
            if (e.key === 'ArrowLeft') prevPhoto();
        });

        // Touch swipe for lightbox
        let touchStartX = 0;
        lightbox.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
        lightbox.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) prevPhoto();
                else nextPhoto();
            }
        });
    </script>
</body>
</html>
